aid: mosaicml
name: MosaicML
description: >-
  MosaicML was a San Francisco-based foundation model training company founded
  in 2021 by Naveen Rao and Hanlin Tang to make large-scale model training
  faster and cheaper through algorithmic and systems efficiency. Databricks
  acquired MosaicML in July 2023 for approximately $1.3 billion and folded the
  team and platform into Databricks Mosaic AI Research. The MosaicML training
  platform is now delivered as Databricks Mosaic AI Training (pretraining and
  finetuning), and the original mosaicml.com domain redirects to the Databricks
  Mosaic Research microsite. MosaicML's surviving open-source artifacts include
  Composer (a PyTorch training library with built-in speedup recipes),
  Streaming (a cloud-native dataset format for efficient distributed training),
  LLM Foundry (the training code behind Databricks' DBRX foundation model),
  the Diffusion training stack, and the MCLI command line and Python SDK that
  orchestrate Pretraining and Finetuning jobs against the managed training
  service. The Mosaic AI Training service itself is accessed exclusively
  through the MCLI command line, the mosaicml-cli Python SDK, and Databricks
  workspace integrations — there is no publicly published REST OpenAPI surface
  for the training control plane. Commercial access requires a Databricks
  account; pricing is consumption-based via Databricks DBU billing rather than
  an independent MosaicML pricing page.
